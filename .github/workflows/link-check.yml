name: Link Check

on:
  schedule:
    - cron: "0 14 * * 1" # every Monday at 14:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: link-check
  cancel-in-progress: true

jobs:
  lychee:
    name: Check links
    permissions:
      contents: read
    uses: starhaven-io/.github/.github/workflows/reusable-link-check.yml@5d7a05a8780166410c5447ebd48e1eb84f89b8b3 # v2026.07.05.1
    with:
      args: "--config lychee.toml README.md"
      build-site: false
      site-directory: ""
      authenticated-github: true
