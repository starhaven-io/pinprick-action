name: CodeQL

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "action.yml"
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

concurrency:
  group: "codeql-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  analyze:
    name: Analyze
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    uses: starhaven-io/.github/.github/workflows/reusable-codeql.yml@7ffa044d5dadee7a17c504bd18bedc48057bf224 # v2026.07.05.2
    with:
      languages: '["actions"]'
      runner: "ubuntu-slim"
      timeout-minutes: 10
      build-mode: ""
      build-profile: ""
