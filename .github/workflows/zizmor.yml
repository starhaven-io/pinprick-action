name: zizmor

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "action.yml"
  schedule:
    - cron: "30 13 * * 1"
  workflow_dispatch:

concurrency:
  group: "zizmor-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  zizmor:
    name: Analyze
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    uses: starhaven-io/.github/.github/workflows/reusable-zizmor.yml@0cffea358b31930d0068ad1419e7522d1ea37764 # v2026.07.16.3
    with:
      timeout-minutes: 10
