name: zizmor

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "action.yml"
  schedule:
    - cron: "30 13 * * 1"
  workflow_dispatch:

concurrency:
  group: "zizmor-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  zizmor:
    name: Analyze
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    uses: starhaven-io/.github/.github/workflows/reusable-zizmor.yml@989b76e2b1ceaf3531da903e288e79929bd2f30e # v2026.07.05.10
    with:
      timeout-minutes: 10
